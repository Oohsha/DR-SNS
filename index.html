<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR-SNS | 커뮤니티</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo" onclick="showView('main-view')">DR-SNS</div>
        <nav id="nav-menu">
            <!-- JS 동적 생성 영역 -->
        </nav>
    </div>
</header>

<div class="container">
    
    <!-- 인증 뷰 (로그인/가입) -->
    <section id="auth-view" class="view">
        <div class="card auth-card">
            <div class="auth-tabs">
                <button id="tab-login" class="active" onclick="toggleAuthTab('login')">로그인</button>
                <button id="tab-signup" onclick="toggleAuthTab('signup')">회원가입</button>
            </div>
            
            <div id="login-form">
                <input type="text" id="login-username" placeholder="아이디">
                <input type="password" id="login-password" placeholder="비밀번호">
                <button class="btn-main" onclick="handleLogin()">로그인</button>
            </div>

            <div id="signup-form" class="hidden">
                <input type="text" id="signup-username" placeholder="새 아이디">
                <input type="password" id="signup-password" placeholder="새 비밀번호">
                <button class="btn-main" onclick="handleSignup()">가입하기</button>
            </div>
        </div>
    </section>

    <!-- 메인 타임라인 뷰 -->
    <section id="main-view" class="view active">
        <!-- 글 작성 카드 (로그인 시에만 노출) -->
        <div id="post-write-area" class="card hidden">
            <h3 class="card-title">새 글 작성</h3>
            <input type="text" id="post-title" placeholder="제목">
            <textarea id="post-content" rows="3" placeholder="내용을 입력하세요."></textarea>
            <div class="btn-right">
                <button class="btn-main btn-small" onclick="handleCreatePost()">게시하기</button>
            </div>
        </div>

        <div id="post-list">
            <!-- 게시글 목록 -->
        </div>
    </section>

    <!-- 프로필 뷰 -->
    <section id="profile-view" class="view">
        <div class="card profile-header">
            <h2 id="user-display-name">사용자 님</h2>
            <p>내가 쓴 글들을 관리합니다.</p>
        </div>
        <div id="my-post-list"></div>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
