<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR-SNS | 통합 커뮤니티 서비스</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo" onclick="showView('main-view')">DR-SNS</div>
        <nav id="nav-menu">
            <!-- 자바스크립트에서 로그인 상태에 따라 버튼 동적 생성 -->
        </nav>
    </div>
</header>

<main class="container">
    
    <!-- 1단계 ~ 4단계: 사용자 인증 뷰 -->
    <section id="auth-view" class="view">
        <div class="auth-container card">
            <div class="auth-tabs">
                <button id="tab-login" class="active" onclick="toggleAuthTab('login')">로그인</button>
                <button id="tab-signup" onclick="toggleAuthTab('signup')">회원가입</button>
            </div>
            
            <div id="login-form">
                <input type="text" id="login-username" placeholder="아이디">
                <input type="password" id="login-password" placeholder="비밀번호">
                <button class="btn-main" onclick="handleLogin()">로그인</button>
            </div>

            <div id="signup-form" class="hidden">
                <input type="text" id="signup-username" placeholder="새 아이디">
                <input type="password" id="signup-password" placeholder="새 비밀번호">
                <button class="btn-main" onclick="handleSignup()">회원가입 완료</button>
            </div>
        </div>
    </section>

    <!-- 1단계 ~ 6단계: 메인 타임라인 뷰 -->
    <section id="main-view" class="view active">
        <!-- 게시글 작성 (로그인 시에만 노출) -->
        <div id="post-write-area" class="card hidden">
            <h3>새로운 소식 공유</h3>
            <input type="text" id="post-title" placeholder="글 제목">
            <textarea id="post-content" rows="3" placeholder="나누고 싶은 이야기를 적어보세요."></textarea>
            <button class="btn-main" onclick="handleCreatePost()">게시하기</button>
        </div>

        <!-- 게시글 목록 리스트 -->
        <div id="post-list"></div>
    </section>

    <!-- 5단계: 사용자 전용 뷰 (마이페이지) -->
    <section id="profile-view" class="view">
        <div class="profile-header card">
            <h2 id="user-display-name">사용자 님</h2>
            <p>내가 작성한 글과 활동을 확인할 수 있습니다.</p>
        </div>
        <div id="my-post-list"></div>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
