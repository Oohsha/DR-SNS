<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR-SNS 커뮤니티</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo" onclick="showView('main-view')">DR-SNS</div>
    <nav id="nav-menu">
        <!-- 로그인 상태에 따라 버튼이 동적으로 생성됩니다 -->
    </nav>
</header>

<div class="container">
    
    <!-- 로그인 페이지 -->
    <section id="login-view" class="view">
        <div class="card auth-card">
            <h2>로그인</h2>
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button class="btn-main" onclick="handleLogin()">로그인</button>
            <p class="auth-link">계정이 없으신가요? <a href="#" onclick="showView('signup-view')">회원가입</a></p>
        </div>
    </section>

    <!-- 회원가입 페이지 -->
    <section id="signup-view" class="view">
        <div class="card auth-card">
            <h2>회원가입</h2>
            <input type="text" id="signup-id" placeholder="아이디">
            <input type="password" id="signup-pw" placeholder="비밀번호">
            <button class="btn-main" onclick="handleSignup()">가입하기</button>
            <p class="auth-link">이미 계정이 있나요? <a href="#" onclick="showView('login-view')">로그인</a></p>
        </div>
    </section>

    <!-- 메인 페이지 -->
    <section id="main-view" class="view active">
        <!-- 글 작성 영역 (로그인 시에만 보임) -->
        <div id="post-write-area" class="card hidden">
            <textarea id="post-input" rows="3" placeholder="지금 무슨 생각을 하고 계신가요?"></textarea>
            <button class="btn-main" onclick="handleCreatePost()">게시하기</button>
        </div>
        <!-- 게시글 목록 -->
        <div id="post-list"></div>
    </section>

    <!-- 사용자 페이지 (내 글 관리) -->
    <section id="profile-view" class="view">
        <h2 id="profile-title">내 게시글 관리</h2>
        <div id="my-post-list"></div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
